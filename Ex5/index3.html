<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Grid Test</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .custom-footer {
        background-color: #d6cdd0; /* Màu nền cho footer giống trong ảnh */
      }
      .grid-cell {
        background-color: #dcdcdc; /* Màu xám nhạt cho các ô */
        border: 1px solid #9e9e9e; /* Viền xám đậm hơn */
      }
    </style>
  </head>
  <body>
    <div class="container-fluid bg-light py-5 mb-4">
      <div class="container">
        <h2>Let's test the grid!</h2>
      </div>
    </div>

    <div class="container mb-4">
      <ul class="nav mb-4">
        <li class="nav mb-4">
          <a class="nav-link active ps-0" href="#">Active</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link disabled"
            href="#"
            tabindex="-1"
            aria-disabled="true"
            >Disabled</a
          >
        </li>
      </ul>
    </div>
    <div class="container mb-4">
      <div class="row">
        <div class="col-6 grid-cell py-3 px-3">First col</div>
        <div class="col-6 grid-cell py-3 px-3">Second col</div>
      </div>

      <div class="row">
        <div class="col-4 grid-cell py-3 px-3">col</div>
        <div class="col-4 grid-cell py-3 px-3">col</div>
        <div class="col-4 grid-cell py-3 px-3">col</div>
      </div>

      <div class="row">
        <div class="col-3 grid-cell py-3 px-3">col</div>
        <div class="col-3 grid-cell py-3 px-3">col</div>
        <div class="col-3 grid-cell py-3 px-3">col</div>
        <div class="col-3 grid-cell py-3 px-3">col</div>
      </div>
    </div>

    <div class="container-fluid custom-footer py-2 text-center text-dark">
      <h3 class="m-0 fw-normal">Created by ABC!</h3>
    </div>
  </body>
</html>
