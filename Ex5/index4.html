<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPT University Layout</title>
  <!-- Nhúng Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Định nghĩa màu sắc đặc trưng của FPT theo ảnh mẫu */
    .fpt-orange-bg {
      background-color: #f29422; 
    }
    .fpt-footer-bg {
      background-color: #f7ce8f;
    }
    .logo-container {
      background-color: white;
      max-width: 450px;
      margin: 0 auto;
      padding: 15px;
    }
  </style>
</head>
<body>


  <header class="fpt-orange-bg text-center py-4">
    <div class="container">

      <div class="logo-container shadow-sm mb-3">

        <img src="/test1/src/assets/fpt.png" alt="FPT University Logo" class="img-fluid">
      </div>
      

      <div class="d-flex justify-content-center gap-3">
        <a href="#" class="text-white text-decoration-none small">Home</a>
        <a href="#" class="text-white text-decoration-none small">About</a>
        <a href="#" class="text-white text-decoration-none small">Contact</a>
      </div>
    </div>
  </header>


  <main class="container text-center py-5">

    <section class="mb-5">
      <h3 class="fw-bold mb-3">About</h3>
      <p class="text-secondary">This is the about section of the website.</p>
    </section>

    <section class="mb-4">
      <h3 class="fw-bold mb-3">Contact</h3>
      <p class="text-secondary">For any inquiries, please contact us at <a href="mailto:example@example.com" class="text-dark">example@example.com</a>.</p>
    </section>
  </main>

 
  <footer class="fpt-footer-bg text-center py-3 text-white small">
    <div class="container">
      <span class="text-dark opacity-75">© 2023 Website. All rights reserved.</span>
    </div>
  </footer>

</body>
</html>
