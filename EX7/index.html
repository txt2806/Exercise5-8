<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .image-frame {
      background-color: #ffffff;
      padding: 15px;
      border-radius: 4px;
    }
    .card-car-img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="container my-4">
    <h3 class="mb-4 text-dark fw-bold">Cards Columns</h3>

    <div class="row row-cols-1 row-cols-md-3 g-3">
      
      <div class="col">
        <div class="card h-100 bg-primary text-white border-0 p-3 rounded-2">
          <div class="image-frame mb-3">
            <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=400" class="card-img-top card-car-img" alt="Car">
          </div>
          <div class="card-body p-0 text-center">
            <p class="card-text small mb-0">Some text inside the first card</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100 bg-warning text-dark border-0 p-3 rounded-2">
          <div class="image-frame mb-3">
            <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=400" class="card-img-top card-car-img" alt="Car">
          </div>
          <div class="card-body p-0 text-center">
            <p class="card-text small mb-0">Some text inside the first card</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100 bg-danger text-white border-0 p-3 rounded-2">
          <div class="image-frame mb-3">
            <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=400" class="card-img-top card-car-img" alt="Car">
          </div>
          <div class="card-body p-0 text-center">
            <p class="card-text small mb-0">Some text inside the first card</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
